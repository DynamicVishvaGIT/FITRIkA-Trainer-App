<div class="mobile-container">
  <!-- MAIN HEADER BACK BAR -->
  <header class="main-header">
   <button class="back-btn" (click)="goBack()" aria-label="Go Back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00d689" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h1 class="header-title">Dietlog</h1>
    <div class="header-spacer"></div>
  </header>

  <main class="scrollable-content">
    <!-- DROP MONTH COMPONENT -->
    <div class="month-selector-container">
      <div class="month-selector" (click)="toggleMonthDropdown()">
        <span>{{ currentMonthName }} {{ currentYear }}</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="dropdown-chevron" [class.rotated]="isDropdownOpen">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>

      <!-- Month Dropdown List overlay -->
      <div class="month-dropdown" *ngIf="isDropdownOpen">
        <div *ngFor="let month of months; let i = index" 
             class="dropdown-item" 
             [class.active]="i === currentDate.getMonth()"
             (click)="selectMonth(i)">
          {{ month }}
        </div>
      </div>
    </div>

    <!-- WEEKDAY LABELS (S M T W T F S) -->
    <div class="weekday-header">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
    </div>

    <!-- HEAT GRIDS SYSTEM WITH DAY NUMBERS -->
    <div class="matrix-wrapper">
      <div class="matrix-grid">
        <div *ngFor="let day of matrixCells" 
             class="matrix-cell" 
             [class.filled]="day.filled" 
             [class.empty]="!day.filled && !day.hidden"
             [class.hidden]="day.hidden">
          <span class="day-number" *ngIf="day.label">{{ day.label }}</span>
        </div>
      </div>
    </div>

    <!-- DIET MANAGEMENT LAYOUT LIST -->
    <div class="log-cards-stack">
      <div class="log-card" *ngFor="let diet of dietLogs">
        <div class="accent-indicator"></div>
        <div class="card-inner-payload">
          <div class="meta-details">
            <h4>{{ diet.title }}</h4>
            <p>{{ diet.date }}</p>
          </div>
          <span class="active-badge">Active</span>
        </div>
      </div>
    </div>

    <!-- ACTIONS SUBMIT -->
    <button class="dashed-add-btn" (click)="addNewDietProgram()">
      <span>+ Add</span>
    </button>
  </main>

  <!-- NAVIGATION BAR FOOTER -->
  <nav class="bottom-nav">
    <button class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
    </button>
    <button class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.57 14.86L22 13.43l-3-3-1.43 1.43 1 1H15c-.55 0-1-.45-1-1V9h1c.55 0 1-.45 1-1V5c0-.55-.45-1-1-1h-4c-.55 0-1 .45-1 1v3c0 .55.45 1 1 1h1v3c0 .55-.45 1-1 1H5.43l1-1-1.43-1.43-3 3 1.43 1.43 1-1V15c0 .55.45 1 1 1h3c.55 0 1-.45 1-1v-1h4v1c0 .55.45 1 1 1h3c.55 0 1-.45 1-1v-1.14l1 1z"/></svg>
    </button>
    <button class="nav-item active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.46 3.89 3.42 4.34V22h2v-8.66C10.54 12.89 12 11.12 12 9V2h-1v7zm7-3h-1V2h-2v4h-1V2h-2v4c0 2.21 1.79 4 4 4v12h2V10c2.21 0 4-1.79 4-4V2h-2v4z"/></svg>
    </button>
    <button class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-33.33-8-4z"/></svg>
    </button>
  </nav>
</div>
