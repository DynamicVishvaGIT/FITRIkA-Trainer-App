<ion-content class="ion-no-padding">
  <div class="sheet-container">
    
    <!-- Header Title Area -->
    <div class="sheet-header">
      <h2 class="sheet-title">Add Workout Log</h2>
      <button class="close-icon-btn" (click)="closeSheet()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </button>
    </div>

    <!-- Data Entry Form Fields -->
    <div class="sheet-body">
      <label class="field-label">Workout Name</label>
      <div class="input-wrapper">
        <input 
          type="text" 
          [(ngModel)]="workoutName" 
          placeholder="Enter workout name" 
          class="clean-native-input"
          (keyup.enter)="submitWorkout()">
      </div>

      <button class="action-submit-btn" [disabled]="!workoutName.trim()" (click)="submitWorkout()">
        Submit
      </button>
    </div>

  </div>
</ion-content>
