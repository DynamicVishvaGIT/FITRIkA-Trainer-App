<ion-content class="ion-no-padding oval-modal-content">
  <div class="edit-modal-wrapper scrollable-modal-content">
    
    <!-- Header Layout -->
    <div class="modal-header">
      <h2>Add {{ fieldTitle }}</h2>
      <button class="close-btn" (click)="dismiss()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Main Content Input Form -->
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label">Item Title</label>
        <input 
          type="text" 
          [(ngModel)]="itemName" 
          placeholder="Enter item name..." 
          class="custom-text-input" 
          autofocus />
      </div>

      <!-- Submit Action Button -->
      <button class="submit-btn" (click)="submit()">Submit</button>
    </div>

  </div>
</ion-content>
