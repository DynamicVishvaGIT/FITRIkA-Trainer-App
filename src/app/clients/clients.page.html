<div class="mobile-container">
  

  <!-- MAIN HEADER -->
  <header class="main-header">
    <button class="menu-btn" aria-label="Menu">
      <div class="custom-menu-icon">
        <span class="line-top"></span>
        <span class="line-bottom"></span>
      </div>
    </button>
    <h1 class="header-title">Diet Plan</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- SEARCH CONTROLLER -->
  <div class="search-container">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Search" [(ngModel)]="searchQuery" (input)="filterClients()" />
    </div>
  </div>

  <!-- FILTER CONTROLS BAR (Image 1 Perfect Styling) -->
  <div class="filter-tabs-row">
    <div class="tabs-group">
      <button class="tab-btn" [class.active]="activeTab === 'prospects'" (click)="setTab('prospects')">
        Prospects <span class="badge badge-prospect">2</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'clients'" (class.active)="activeTab === 'clients'" (click)="setTab('clients')">
        Clients <span class="badge badge-client">3</span>
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'ex-clients'" (click)="setTab('ex-clients')">
        Ex-Clients <span class="badge badge-ex">1</span>
      </button>
    </div>
    
    <button class="filter-action-btn">
      <span>Filter</span>
      <svg class="filter-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 4a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v2.5a1 1 0 0 1-.293.707L15 13.414V19a1 1 0 0 1-.447.894l-4 2A1 1 0 0 1 9 21v-7.586L3.293 7.207A1 1 0 0 1 3 6.5V4z"/>
      </svg>
    </button>
  </div>

  <!-- SCROLLABLE LIST CONTAINER -->
  <main class="scrollable-content">
    <!-- FIXED: Added (click) event listener and a visual pointer CSS class -->
    <div class="client-card clickable-card" *ngFor="let client of filteredClients" (click)="viewClientProfile(client)">
      <div class="avatar-container">
        <img [src]="client.avatar" [alt]="client.name" />
      </div>
      <div class="client-info">
        <h3>{{ client.name }}</h3>
        
        <div class="info-grid">
          <div class="info-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" class="icon-green">
              <path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/>
            </svg>
            <span class="info-text">{{ client.phone }}</span>
          </div>
          
          <div class="info-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00d689" stroke-width="2.5" class="icon-green">
              <circle cx="12" cy="9" r="4"></circle>
              <path d="M12 13v7M9 16h6"/>
            </svg>
            <span class="info-text">{{ client.gender }}</span>
          </div>

          <div class="info-item full-width">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" class="icon-green">
              <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <span class="info-text muted-email">{{ client.email }}</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- BOTTOM NAVIGATION (Clean Outline Style from Image 1) -->
  <nav class="bottom-nav">
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </button>
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 22v-4m3 4v-6m3 6V10m3 12V6m3 16V2"/></svg>
    </button>
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </button>
    <button class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </nav>
</div>
