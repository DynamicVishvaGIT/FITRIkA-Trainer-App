<ion-header class="ion-no-border global-slot-header">
  <ion-toolbar class="slot-toolbar-container">
    <ion-buttons slot="start">
      <ion-button class="back-navigation-btn" (click)="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00df9a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </ion-button>
    </ion-buttons>
    <ion-title class="slot-centered-title">Slot Sheet</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="slot-page-content">

  <!-- Profile Header Card Block -->
  <div class="trainer-profile-card" *ngIf="showProfile">
    <div class="profile-avatar-frame">
      <img src="https://i.pravatar.cc/150?img=47" alt="Profile User" />
    </div>
    <div class="profile-details-column">
      <h2 class="profile-heading-name">Astha Dhaliwal</h2>
      
      <div class="profile-meta-row">
        <span class="meta-inline-item">
          <ion-icon name="call-outline"></ion-icon> +91 9876543210
        </span>
        <span class="meta-inline-item">
          <ion-icon name="person-outline"></ion-icon> Female
        </span>
      </div>
      
      <p class="profile-email-line">
        <ion-icon name="mail-outline"></ion-icon> asthadhaliwal@gmail.com
      </p>
    </div>
  </div>

  <!-- Horizontal Week Calendar Day Strip -->
  <div class="calendar-horizontal-strip">
    <div 
      *ngFor="let day of days" 
      class="calendar-day-node" 
      [class.node-selected-active]="day.date === selectedDate"
      (click)="selectDay(day.date)"
    >
      <span class="node-day-label">{{ day.name }}</span>
      <span class="node-date-numeric">{{ day.date }}</span>
    </div>
  </div>

  <!-- Action Row: Add New Slot Trigger -->
  <div class="action-trigger-container">
    <button class="pill-add-action-btn" (click)="openAddSlotModal()">
      <span class="math-plus-symbol">+</span> Add
    </button>
  </div>

  <!-- Dynamic Content Slots List View Container -->
  <div class="slots-vertical-feed-stack">
    <div class="time-slot-display-card" *ngFor="let slot of filteredSlots">
      
      <div class="slot-left-details">
        <h3 class="slot-duration-headline">{{ slot.startTime }} - {{ slot.endTime }}</h3>
        
        <div class="slot-badges-inline-row">
          <span class="pill-status-badge" [ngClass]="slot.status.toLowerCase()">
            {{ slot.statusLabel }}
          </span>
          <span class="pill-sub-context-type" *ngIf="slot.type">{{ slot.type }}</span>
        </div>
      </div>

      <div class="slot-right-actions">
        <!-- Structural edit/lock responsive state icons -->
        <button class="icon-utility-action-btn interaction-edit-trigger" (click)="openEditModal(slot)">
          <ion-icon [name]="slot.status === 'Blocked' ? 'lock-closed-outline' : (slot.status === 'Free' ? 'lock-open-outline' : 'pencil-outline')"></ion-icon>
        </button>
        
        <!-- Danger/Trash Delete Button -->
        <button class="icon-utility-action-btn interaction-delete-trigger" (click)="deleteSlot(slot.id)">
          <ion-icon name="trash-outline"></ion-icon>
        </button>
      </div>

    </div>
  </div>

</ion-content>
