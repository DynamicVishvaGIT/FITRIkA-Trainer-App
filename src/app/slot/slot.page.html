<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="back-btn" (click)="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00df9a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </ion-button>
    </ion-buttons>
    <ion-title>Slot Sheet</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Profile Header Card (As shown in Image 1/4) -->
  <div class="profile-card" *ngIf="showProfile">
    <div class="avatar-container">
      <img src="https://i.pravatar.cc/150?img=47" alt="Astha Dhaliwal" />
    </div>
    <div class="profile-info">
      <h2>Astha Dhaliwal</h2>
      <div class="info-row">
        <span class="info-item"><ion-icon name="call"></ion-icon> +91 9876543210</span>
        <span class="info-item"><ion-icon name="transgender"></ion-icon> Female</span>
      </div>
      <p class="email-item"><ion-icon name="mail"></ion-icon> asthadhaliwal@gmail.com</p>
    </div>
  </div>

  <!-- Days Horizontal Selector Alignment -->
  <div class="days-container">
    <div 
      *ngFor="let day of days" 
      class="day-box" 
      [class.active]="day.date === selectedDate"
      (click)="selectDay(day.date)"
    >
      <span class="day-name">{{ day.name }}</span>
      <span class="day-date">{{ day.date }}</span>
      <span class="dot" *ngIf="day.date === selectedDate">•</span>
    </div>
  </div>

  <!-- Add Slot Trigger Bar -->
  <div class="add-container">
    <button class="add-btn" (click)="openAddSlotModal()">
      <span class="plus-circle">+</span> Add
    </button>
  </div>

  <!-- Slots List View (Clean Border Layout from Image 1) -->
  <div class="slots-list">
    <div class="slot-card" *ngFor="let slot of filteredSlots">
      <div class="slot-details">
        <h3 class="slot-time">{{ slot.startTime }} - {{ slot.endTime }}</h3>
        
        <div class="badge-row">
          <span class="status-badge" [ngClass]="slot.status.toLowerCase()">
            {{ slot.statusLabel }}
          </span>
          <span class="slot-type" *ngIf="slot.type">{{ slot.type }}</span>
        </div>
      </div>

      <div class="slot-actions">
        <!-- Edit Action Dynamic Icon Trigger -->
        <button class="action-btn edit-btn" (click)="openEditModal(slot)">
          <ion-icon [name]="slot.status === 'Blocked' ? 'lock-closed-outline' : (slot.status === 'Free' ? 'lock-open-outline' : 'pencil-outline')"></ion-icon>
        </button>
        <!-- Trash Delete Action -->
        <button class="action-btn delete-btn" (click)="deleteSlot(slot.id)">
          <ion-icon name="trash-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>
</ion-content>
