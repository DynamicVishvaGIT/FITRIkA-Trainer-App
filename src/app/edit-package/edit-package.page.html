<div class="app-container package-creation-view">
  <!-- Header Section -->
  <header class="app-header">
    <button class="icon-btn back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00c48c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h1>Package Creation </h1>
    <div style="width: 24px;"></div> <!-- Spacer for perfect centering -->
  </header>

  <!-- Scrollable Editor Form Body -->
  <main class="content-scroll">
    
    <!-- Package Name input -->
    <div class="form-section">
      <label class="section-title">Package Name</label>
      <div class="input-wrapper">
        <input type="text" [(ngModel)]="pkg.name" placeholder="e.g. Personal Training" class="custom-text-input" />
      </div>
    </div>

    <!-- Pricing Selector -->
    <div class="form-section">
      <label class="section-title">Pricing (₹)</label>
      <div class="chip-row">
        <button 
          *ngFor="let price of pricingOptions" 
          class="chip-item" 
          [class.active]="pkg.price === price" 
          (click)="selectPrice(price)">
          <span class="check-dot" *ngIf="pkg.price === price">✓</span>
          {{ price | number }}
        </button>
      </div>
    </div>

    <!-- Validity Selector -->
    <div class="form-section">
      <label class="section-title">Validity</label>
      <div class="chip-row">
        <button 
          *ngFor="let validity of validityOptions" 
          class="chip-item" 
          [class.active]="pkg.validity === validity" 
          (click)="selectValidity(validity)">
          <span class="check-dot" *ngIf="pkg.validity === validity">✓</span>
          {{ validity }}
        </button>
      </div>
    </div>

    <!-- Number of Sessions Selector -->
    <div class="form-section">
      <label class="section-title">Number of Sessions</label>
      <div class="chip-row">
        <button 
          *ngFor="let sessionCount of sessionOptions" 
          class="chip-item" 
          [class.active]="pkg.sessions === sessionCount" 
          (click)="selectSessions(sessionCount)">
          <span class="check-dot" *ngIf="pkg.sessions === sessionCount">✓</span>
          {{ sessionCount }}
        </button>
      </div>
    </div>

    <!-- Session Duration Selector -->
    <div class="form-section">
      <label class="section-title">Session Duration</label>
      <div class="chip-row">
        <button 
          *ngFor="let duration of durationOptions" 
          class="chip-item" 
          [class.active]="pkg.duration === duration" 
          (click)="selectDuration(duration)">
          <span class="check-dot" *ngIf="pkg.duration === duration">✓</span>
          {{ duration }}
        </button>
      </div>
    </div>

    <!-- Program For Chips (With Add Trigger) -->
    <div class="form-section">
      <label class="section-title">Program For</label>
      <div class="chip-row wrap-row">
        <button 
          *ngFor="let pFor of programForOptions" 
          class="chip-item selectable" 
          [class.active]="hasProgramFor(pFor)" 
          (click)="toggleProgramFor(pFor)">
          {{ pFor }}
        </button>
        <button class="add-chip-btn" (click)="openAddCustomModal('Program For', 'programFor')">
          <span class="plus-icon">+</span>
        </button>
      </div>
    </div>

    <!-- Training Style Chips (With Add Trigger) -->
    <div class="form-section">
      <label class="section-title">Training Style</label>
      <div class="chip-row wrap-row">
        <button 
          *ngFor="let style of trainingStyleOptions" 
          class="chip-item selectable" 
          [class.active]="pkg.trainingStyle === style" 
          (click)="selectTrainingStyle(style)">
          {{ style }}
        </button>
        <button class="add-chip-btn" (click)="openAddCustomModal('Training Style', 'trainingStyle')">
          <span class="plus-icon">+</span>
        </button>
      </div>
    </div>

    <!-- Level Chips (With Add Trigger) -->
    <div class="form-section">
      <label class="section-title">Level</label>
      <div class="chip-row wrap-row">
        <button 
          *ngFor="let lvl of levelOptions" 
          class="chip-item selectable" 
          [class.active]="pkg.level === lvl" 
          (click)="selectLevel(lvl)">
          {{ lvl }}
        </button>
        <button class="add-chip-btn" (click)="openAddCustomModal('Level', 'level')">
          <span class="plus-icon">+</span>
        </button>
      </div>
    </div>

    <!-- Program Inclusions Selector List (With Add Trigger) -->
    <div class="form-section">
      <label class="section-title">Program Inclusions</label>
      <div class="list-container">
        <div 
          *ngFor="let inclusion of inclusionsOptions" 
          class="list-item" 
          [class.active]="hasInclusion(inclusion)" 
          (click)="toggleInclusion(inclusion)">
          <span>{{ inclusion }}</span>
          <span class="check-icon" *ngIf="hasInclusion(inclusion)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00c48c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </div>
        <button class="add-list-item-btn" (click)="openAddCustomModal('Program Inclusion', 'inclusion')">
          <span class="plus-icon">+</span>
        </button>
      </div>
    </div>

    <!-- Expected Results Selector List (With Add Trigger) -->
    <div class="form-section">
      <label class="section-title">Expected Results</label>
      <div class="grid-list-container">
        <div 
          *ngFor="let result of expectedResultsOptions" 
          class="list-item" 
          [class.active]="hasExpectedResult(result)" 
          (click)="toggleExpectedResult(result)">
          <span>{{ result }}</span>
          <span class="check-icon" *ngIf="hasExpectedResult(result)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00c48c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </div>
        <button class="add-list-item-btn grid-span-full" (click)="openAddCustomModal('Expected Result', 'result')">
          <span class="plus-icon">+</span>
        </button>
      </div>
    </div>

  </main>

  <!-- Submit Panel -->
  <footer class="sticky-footer">
    <button class="primary-submit-btn" (click)="savePackage()">Save Package</button>
  </footer>
</div>
