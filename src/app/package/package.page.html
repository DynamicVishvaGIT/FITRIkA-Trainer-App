<div class="app-container package-view">
  
  <!-- Header Section -->
  <header class="app-header">
    <button class="back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00c48c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <h1 class="header-title">Package</h1>
    <button class="add-btn" (click)="navigateToAddPackage()">
      <span class="plus-circle">+</span> Add
    </button>
  </header>
  
  <!-- Scrollable Card Content -->
  <main class="content-scroll">
    <div 
      *ngFor="let pkg of packages" 
      class="package-card" 
      [class.active]="selectedPackageId === pkg.id">
      
      <!-- Inside Left Accent Strip for Selected Card -->
      <div class="accent-strip" *ngIf="selectedPackageId === pkg.id"></div>

      <!-- Card Top Main Row (Handles Selection & Expansion) -->
      <div class="card-header" (click)="handleCardSelect(pkg)">
        <div class="header-left">
          <!-- Custom Radio Indicator Component -->
          <div class="custom-radio" [class.checked]="selectedPackageId === pkg.id">
            <div class="radio-inner" *ngIf="selectedPackageId === pkg.id"></div>
          </div>

          <!-- Package Name Title -->
          <span class="package-name">{{ pkg.name }}</span>

          <!-- Uniform Edit Button (Stops expansion/selection event conflicts) -->
          <button class="edit-icon-btn" (click)="navigateToEditPackage($event, pkg.id)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M11 4H6C4.89543 4 4 4.89543 4 6V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V13" 
                    stroke="#00c48c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M18.5 2.5C19.3284 1.67157 20.6716 1.67157 21.5 2.5C22.3284 3.32843 22.3284 4.67157 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z" 
                    stroke="#00c48c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="header-right">
          <!-- Pricing Structure -->
          <div class="price-container">
            <span class="price-amount">₹{{ pkg.price | number }}</span>
            <span class="price-period">per month</span>
          </div>

          <!-- Dynamic Chevron Arrow Toggle -->
          <div class="chevron-indicator">
            <svg *ngIf="!pkg.isExpanded" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
            <svg *ngIf="pkg.isExpanded" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </div>

      <!-- Expandable Feature List Grid Container -->
      <div class="card-details" *ngIf="pkg.isExpanded">
        <div class="details-divider"></div>
        <ul class="inclusions-list">
          <li *ngFor="let item of pkg.inclusions">
            <span class="check-dot">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00c48c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="inclusion-text">{{ item }}</span>
          </li>
        </ul>
      </div>

    </div>
  </main>

  <!-- Absolute Positioned Select Footer Box -->
  <footer class="sticky-footer">
    <button class="primary-select-btn" (click)="confirmSelection()">Select</button>
  </footer>
</div>
