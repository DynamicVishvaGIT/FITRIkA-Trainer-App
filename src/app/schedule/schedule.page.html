<div class="mobile-container">
  <!-- HEADER CONTROLLER -->
  <header class="main-header">
    <button class="menu-btn" (click)="goBack()" aria-label="Menu">
      <div class="custom-menu-icon">
        <span class="line-1"></span>
        <span class="line-2"></span>
        <span class="line-3"></span>
      </div>
    </button>
    <h1 class="header-title">Schedule</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- CALENDAR STRIP SECTION -->
  <div class="calendar-section">
    <div class="month-selector">
      <h2>{{ currentMonthYear }}</h2>
      <div class="nav-arrows">
        <button class="arrow-btn" (click)="previousMonth()" aria-label="Previous month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="arrow-btn" (click)="nextMonth()" aria-label="Next month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="days-strip">
      <div *ngFor="let day of calendarDays" 
           class="day-box" 
           [class.active]="day.isActive"
           (click)="selectDay(day)">
        <span class="day-name">{{ day.label }}</span>
        <span class="day-number">{{ day.dateNum }}</span>
        <span class="dot-indicator" *ngIf="day.isActive"></span>
      </div>
    </div>
  </div>

  <!-- TIMELINE WITH CUSTOM CARDS CONTAINER -->
  <main class="timeline-scroll-container">
    <div class="timeline-item" *ngFor="let appt of appointments; let first = first">
      
      <!-- Left Timeline Track Column -->
      <div class="time-track-col">
        <span class="time-stamp">{{ appt.time }}</span>
        <div class="node-indicator" [class.hollow]="!first"></div>
        <div class="vertical-dash-line"></div>
      </div>

      <!-- Right Card Wrapper (Triggers profile redirection globally on card click) -->
    <div class="card-outer-wrapper" routerLink="/profile">
        <div class="schedule-card">
          <div class="card-main-row">
            <img [src]="appt.avatar" [alt]="appt.clientName" class="client-avatar" 
                 onerror="this.src='https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=150'" />
            <div class="client-meta">
              <h3>{{ appt.clientName }}</h3>
              <p>{{ appt.type }}</p>
            </div>
            <button class="options-menu-btn" (click)="$event.stopPropagation(); openMoreOptions(appt)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
              </svg>
            </button>
          </div>

          <div class="card-actions-row">
            <button class="action-outline-btn" (click)="$event.stopPropagation(); goToWorkoutLog(appt)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              <span>Today's Workout</span>
            </button>

            <button class="status-action-btn" 
                    [class.checked-in]="appt.isCheckedIn"
                    (click)="$event.stopPropagation(); toggleCheckIn(appt)">
              {{ appt.isCheckedIn ? 'Checked In' : 'Check - In' }}
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>
