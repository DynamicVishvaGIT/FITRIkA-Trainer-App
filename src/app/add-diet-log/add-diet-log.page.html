<div class="sheet-wrapper">
  <!-- SHEET HEADER WITH CLOSE ICON DISMISS -->
  <header class="sheet-header">
    <h2 class="sheet-title">Add Diet Log</h2>
    <button class="close-icon-btn" (click)="dismissModal()" aria-label="Close sheet">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </button>
  </header>

  <!-- FORM CONTAINER CONTENT -->
  <div class="sheet-form-content">
    <label class="input-label" for="dietProgramName">Program Name</label>
    <div class="input-container">
      <input 
        id="dietProgramName" 
        type="text" 
        [(ngModel)]="programName" 
        placeholder="Enter Program name" 
        class="custom-form-input"
        autofocus
      />
    </div>

    <!-- ACTION SUBMIT -->
    <button class="sheet-submit-btn" (click)="submitData()">
      <span>Submit</span>
    </button>
  </div>
</div>
